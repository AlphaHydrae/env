# tmux configuration
#
# - Nested-session UX with three visual/control states: active, passive-outer,
#   passive-inner.
# - Script-rendered status bar:
#   - left: SSH/context/environment badges
#   - right: backup freshness, CPU/MEM, and clock
# - Vi-flavored copy mode and shell-centric navigation/utility bindings.
# - Dynamic mode transitions driven by startup/client/session hooks.

segment_separator=''

# Increase scrollback buffer size
set -g history-limit 50000

# Advertise tmux terminal type so plain SSH from inside tmux is detectable remotely.
set -g default-terminal "tmux-256color"

# Previous pane shortcut
bind -T prefix k select-pane -t :.-
# Kill pane shortcut
bind -T prefix X kill-pane
# Kill session shortcut
bind -T prefix W kill-session

# Display popup
bind -T root C-p display-popup -E ""
# Display popup with htop
bind -T root C-h display-popup -E "htop"
# Zoom pane
bind -T root C-z resize-pane -Z

# Open new panes/windows in the active pane's working directory. Per-window by
# nature: each split inherits the focused pane's cwd.
bind -T prefix '"' split-window    -c "#{pane_current_path}"
bind -T prefix  %  split-window -h -c "#{pane_current_path}"
bind -T prefix  c  new-window      -c "#{pane_current_path}"

# Pane resize shortcuts
bind -r -T prefix H resize-pane -L 2
bind -r -T prefix J resize-pane -D 2
bind -r -T prefix K resize-pane -U 2
bind -r -T prefix L resize-pane -R 2

# Relaunch last command in current pane
bind-key -T root C-q send-keys -t :. C-c '!!' Enter Enter

# Toggle synchronized panes
bind-key -T root C-s if -F "#{pane_synchronized}" "set-window-option synchronize-panes off" "set-window-option synchronize-panes on"

# Vi navigation & motions
set-window-option -g mode-keys vi

# Vi copy mode shortcuts & macOS clipboard integration
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi u send -X halfpage-up
bind-key -T copy-mode-vi d send -X halfpage-down
bind-key -T copy-mode-vi J send -N 5 -X cursor-down
bind-key -T copy-mode-vi K send -N 5 -X cursor-up
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Hide shell backup segment inside tmux panes.
set-environment -g PROMPT_BACKUP_AGE "off"

# Track nested mode so status rendering and key behavior stay in sync.
# Values: active, passive-outer, passive-inner
set -g @nested_mode "active"
set -g @nested_role "outer"
set -g @nested_debug "0"
# If set to 0, SSH + tmux TERM fallback will not auto-enable passive-inner.
set -g @nested_auto_over_ssh "1"

# Local semantic aliases for readable status/style composition below.
theme_bg_base='#262626'
theme_bg_muted='#303030'
theme_bg_panel='#3a3a3a'
theme_fg_subtle='#444444'
theme_bg_passive='#626262'
theme_fg_accent_active='#00abab'
theme_fg_accent_passive='#875fff'

# Shared theme inputs for tmux config and helper scripts.
# - segment_separator caps colored status/window segments.
# - @theme_* options are the canonical values consumed by tmux helper scripts.
set -g @theme_segment_separator "$segment_separator"
set -g @theme_bg_base "$theme_bg_base"
set -g @theme_bg_muted "$theme_bg_muted"
set -g @theme_bg_panel "$theme_bg_panel"
set -g @theme_fg_subtle "$theme_fg_subtle"
set -g @theme_bg_passive "$theme_bg_passive"
set -g @theme_fg_accent_active "$theme_fg_accent_active"
set -g @theme_fg_accent_passive "$theme_fg_accent_passive"

# Left status payload and mode marker are composed separately, then combined.
tmux_script_dir='$(dirname $(readlink ~/.tmux.conf))/tmux'
left_status_segment='#($(dirname $(readlink ~/.tmux.conf))/tmux/left-status.sh "#{@nested_mode}")'

# Mode segment branch order:
# 1) passive-outer => PASS marker
# 2) passive-inner => muted OFF marker
# 3) active + prefix => blue chevron
# 4) active + copy mode => COPY badge
# 5) active + sync panes => SYNC badge
# 6) fallback => cyan dot
mode_segment_passive_outer="#[fg=black bg=$theme_fg_accent_passive] PASS "
mode_segment_passive_inner="#[fg=black bg=$theme_bg_passive] OFF "
mode_segment_active_prefix='#[fg=black bg=blue] » '
mode_segment_active_copy='#[fg=black bg=yellow] COPY '
mode_segment_active_sync='#[fg=black bg=red] SYNC '
mode_segment_active_default='#[fg=black bg=cyan] · '

mode_segment_when_sync="#{?pane_synchronized,${mode_segment_active_sync},${mode_segment_active_default}}"
mode_segment_when_copy="#{?pane_in_mode,${mode_segment_active_copy},${mode_segment_when_sync}}"
mode_segment_when_prefix="#{?client_prefix,${mode_segment_active_prefix},${mode_segment_when_copy}}"
mode_segment_when_inner="#{?#{==:#{@nested_mode},passive-inner},${mode_segment_passive_inner},${mode_segment_when_prefix}}"
status_mode_segment="#{?#{==:#{@nested_mode},passive-outer},${mode_segment_passive_outer},${mode_segment_when_inner}}"

status_left_lead_colors="#{?#{==:#{@nested_mode},active},#[fg=$theme_bg_base bg=$theme_fg_accent_active],#[fg=$theme_bg_base bg=$theme_bg_passive]}"
status_left_tail_colors="#{?#{==:#{@nested_mode},active},#[fg=$theme_fg_accent_active bg=$theme_bg_base],#[fg=$theme_bg_passive bg=$theme_bg_muted]}$segment_separator"
status_left="${left_status_segment}${status_mode_segment}${status_left_lead_colors}  #S ${status_left_tail_colors}"

# Right status is role-aware (inner sessions intentionally omit the clock).
status_right='#($(dirname $(readlink ~/.tmux.conf))/tmux/right-status.sh "#{@nested_mode}" "#{@nested_role}")'

# Tracks whether this tmux instance is passive while a nested tmux is active.
set -g @nested_passive 0

# Right status
set -g status-right-length 40
set -g status-right "$status_right"

# Show ZOOMED in pane border
set-option -g pane-border-format " #{?window_zoomed_flag,#[fg=red bold]ZOOMED,#{pane_current_command}} "

set -g status-interval "1"
set -g status on
set -g status-left-length 80
set -g status-left "$status_left"
set -g focus-events on

# Window/message/status style bundles are applied centrally by set-nested-mode.sh.
set -g window-status-separator ""

set -g pane-border-style "fg=$theme_fg_subtle,bg=default"
set -g pane-active-border-style "fg=$theme_fg_accent_active,bg=default"

set -g display-panes-colour "$theme_fg_subtle"
set -g display-panes-active-colour "$theme_fg_accent_active"

set -g clock-mode-colour "$theme_fg_accent_active"
set -g clock-mode-style 24

set -g mode-style "bg=$theme_fg_accent_active,fg=$theme_bg_passive"

# Apply a known-good active profile at startup.
# Runtime transitions are then handled by nested-control signals and hooks.
run-shell "bash $tmux_script_dir/set-nested-mode.sh active outer"

# Nested tmux signals received from an outer tmux session.
bind -n M-F12 \
	run-shell "bash $tmux_script_dir/set-nested-mode.sh active inner"

bind -n M-F11 \
	run-shell "bash $tmux_script_dir/set-nested-mode.sh passive-inner inner"

# Activate/deactivate nested control.
bind -n S-Up \
	run-shell "bash $tmux_script_dir/set-nested-control.sh passive"

bind -n S-Down \
	run-shell "bash $tmux_script_dir/set-nested-control.sh active"

bind -n F12 if -F "#{@nested_passive}" \
	"run-shell 'bash $tmux_script_dir/set-nested-control.sh active'" \
	"run-shell 'bash $tmux_script_dir/set-nested-control.sh passive'"

# Quick regression checklist after editing nested tmux behavior:
# - Start a local tmux session and confirm active styling.
# - Toggle passive/active outer mode and confirm style + prefix handoff.
# - Use sshx into a remote tmux and confirm passive-inner detection.
# - Confirm left/right status segments are still populated.
# Initialize nested inner mode as soon as a client exists, and on future client changes.
run-shell "bash $tmux_script_dir/auto-nested-init.sh startup '#{client_termname}' '#{session_name}'"
set-hook -g client-attached \
	"run-shell \"bash $tmux_script_dir/auto-nested-init.sh client-attached '#{client_termname}' '#{session_name}'\""
set-hook -g client-session-changed \
	"run-shell \"bash $tmux_script_dir/auto-nested-init.sh client-session-changed '#{client_termname}' '#{session_name}'\""
set-hook -g client-focus-in "refresh-client -S"
set-hook -g session-created \
	"run-shell \"bash $tmux_script_dir/auto-nested-init.sh session-created '#{client_termname}' '#{session_name}'\""
set-hook -g after-new-session \
	"run-shell \"bash $tmux_script_dir/auto-nested-init.sh after-new-session '#{client_termname}' '#{session_name}'\""

set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX plugin manager
# (keep this line at the bottom)
run '~/.tmux/plugins/tpm/tpm'
