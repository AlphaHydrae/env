rarrow='î‚¸'
larrow='î‚ş'

# Increase scrollback buffer size
set -g history-limit 50000

# Advertise tmux terminal type so plain SSH from inside tmux is detectable remotely.
set -g default-terminal "tmux-256color"

# Previous pane shortcut
bind -T prefix k select-pane -t :.-
# Kill pane shortcut
bind -T prefix X kill-pane
# Kill session shortcut
bind -T prefix W kill-session

# Display popup
bind -T root C-p display-popup -E ""
# Display popup with htop
bind -T root C-h display-popup -E "htop"
# Zoom pane
bind -T root C-z resize-pane -Z

# Pane resize shortcuts
bind -r -T prefix H resize-pane -L 2
bind -r -T prefix J resize-pane -D 2
bind -r -T prefix K resize-pane -U 2
bind -r -T prefix L resize-pane -R 2

# Relaunch last command in current pane
bind-key -T root C-q send-keys -t :. C-c '!!' Enter Enter

# Toggle synchronized panes
bind-key -T root C-s if -F "#{pane_synchronized}" "set-window-option synchronize-panes off" "set-window-option synchronize-panes on"

# Vi navigation & motions
set-window-option -g mode-keys vi

# Vi copy mode shortcuts & macOS clipboard integration
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi u send -X halfpage-up
bind-key -T copy-mode-vi d send -X halfpage-down
bind-key -T copy-mode-vi J send -N 5 -X cursor-down
bind-key -T copy-mode-vi K send -N 5 -X cursor-up
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Hide shell backup segment inside tmux panes.
set-environment -g PROMPT_BACKUP_AGE "off"

# Track nested control mode for script-driven status rendering.
# Values: active, passive-outer, passive-inner
set -g @nested_mode "active"
set -g @nested_role "outer"
set -g @nested_debug "0"
# If set to 0, SSH + tmux TERM fallback will not auto-enable passive-inner.
set -g @nested_auto_over_ssh "1"

G0='#262626'
G1='#303030'
G2='#3a3a3a'
G3='#444444'
G4='#626262'
TC='#00abab'
TP='#875fff'
indicators="#{?window_bell_flag,!,}#{?window_silence_flag,~,}#{?window_marked_flag,M,}#{?window_zoomed_flag, ZOOM,}"

# Segments composed from workspace scripts and current mode marker.
left_status_segment='#($(dirname $(readlink ~/.tmux.conf))/tmux/left-status.sh "#{@nested_mode}")'
status_mode_segment='#{?#{==:#{@nested_mode},passive-outer},#[fg=black bg=$TP] PASS ,#{?#{==:#{@nested_mode},passive-inner},#[fg=black bg=$G4] Â· ,#{?client_prefix,#[fg=black bg=blue] Â» ,#{?pane_in_mode,#[fg=black bg=yellow] COPY ,#{?pane_synchronized,#[fg=black bg=red] SYNC ,#[fg=black bg=cyan] Â· }}}}}'

status_left="${left_status_segment}${status_mode_segment}#{?#{==:#{@nested_mode},active},#[fg=$G0 bg=$TC],#[fg=$G0 bg=$G4]} ď€‰ #S #{?#{==:#{@nested_mode},active},#[fg=$TC bg=$G0],#[fg=$G4 bg=$G1]}$rarrow"

window_status_format_active="#[fg=$G0,bg=$G2]$rarrow#[fg=$TC,bg=$G2] #Iâ–¸#W${indicators} #[fg=$G2,bg=$G0]$rarrow"
window_status_format_passive="#[fg=$G1,bg=$G2]$rarrow#[fg=$G3,bg=$G2] #Iâ–¸#W${indicators} #[fg=$G2,bg=$G1]$rarrow"

window_status_current_format_active="#{?window_zoomed_flag,#[fg=$G0 bg=colour9],#[fg=$G0 bg=$TC]}$rarrow#{?window_zoomed_flag,#[fg=$G0 bg=colour9 bold],#[fg=$G0 bg=$TC bold]} #Iâ–¸#W${indicators} #{?window_zoomed_flag,#[fg=colour9 bg=$G0 none],#[fg=$TC bg=$G0 none]}$rarrow"
window_status_current_format_passive_outer="#{?window_zoomed_flag,#[fg=$G0 bg=colour9],#[fg=$G0 bg=$TP]}$rarrow#{?window_zoomed_flag,#[fg=$G0 bg=colour9 bold],#[fg=$G0 bg=$TP bold]} #Iâ–¸#W${indicators} #{?window_zoomed_flag,#[fg=colour9 bg=$G1 none],#[fg=$TP bg=$G1 none]}$rarrow"
window_status_current_format_passive_inner="#{?window_zoomed_flag,#[fg=$G0 bg=colour9],#[fg=$G0 bg=$G4]}$rarrow#{?window_zoomed_flag,#[fg=$G0 bg=colour9 bold],#[fg=$G0 bg=$G4 bold]} #Iâ–¸#W${indicators} #{?window_zoomed_flag,#[fg=colour9 bg=$G1 none],#[fg=$G4 bg=$G1 none]}$rarrow"

status_right='#($(dirname $(readlink ~/.tmux.conf))/tmux/right-status.sh "#{@nested_mode}" "#{@nested_role}")'
nested_mode_script='$(dirname $(readlink ~/.tmux.conf))/tmux/set-nested-mode.sh'
nested_auto_script='$(dirname $(readlink ~/.tmux.conf))/tmux/auto-nested-init.sh'

# Tracks whether this tmux instance is passive while a nested tmux is active.
set -g @nested_passive 0

# Right status
set -g status-right-length 40
set -g status-right "$status_right"

# Gray out inactive panes
set -g window-style 'bg=colour233'
set -g window-active-style 'bg=black'

# Show ZOOMED in pane border
set-option -g pane-border-format " #{?window_zoomed_flag,#[fg=red bold]ZOOMED,#{pane_current_command}} "

set -g status-interval "1"
set -g status on
set -g status-style "fg=$G4,bg=$G0"
set -g status-left-length 80
set -g status-left "$status_left"

set -g window-status-format "$window_status_format_active"
set -g window-status-current-format "$window_status_current_format_active"

set -g window-status-style          "fg=$TC,bg=$G0,none"
set -g window-status-last-style     "fg=$TC,bg=$G0,bold"
set -g window-status-activity-style "fg=$TC,bg=$G0,bold"
set -g window-status-bell-style     "fg=$TC,bg=$G0,bold"
set -g window-status-separator ""

set -g pane-border-style "fg=$G3,bg=default"
set -g pane-active-border-style "fg=$TC,bg=default"

set -g display-panes-colour "$G3"
set -g display-panes-active-colour "$TC"

set -g clock-mode-colour "$TC"
set -g clock-mode-style 24

set -g message-style "fg=$TC,bg=$G0"
set -g message-command-style "fg=$TC,bg=$G0"
set -g mode-style "bg=$TC,fg=$G4"

# Nested tmux signals received from an outer tmux session.
bind -n M-F12 \
	run-shell "bash $nested_mode_script active inner"

bind -n M-F11 \
	run-shell "bash $nested_mode_script passive-inner inner"

# Activate/deactivate nested control.
bind -n S-Up \
	send-keys M-F12 \; \
	run-shell "bash $nested_mode_script passive-outer outer" \; \
	set -g prefix M-F12 \; \
	unbind -T root C-p \; \
	unbind -T root C-h \; \
	unbind -T root C-z \; \
	unbind -T root C-q \; \
	unbind -T root C-s

bind -n S-Down \
	send-keys M-F11 \; \
	run-shell "bash $nested_mode_script active outer" \; \
	set -g prefix C-b \; \
	bind -T root C-p display-popup -E "" \; \
	bind -T root C-h display-popup -E "htop" \; \
	bind -T root C-z resize-pane -Z \; \
	bind-key -T root C-q send-keys -t :. C-c '!!' Enter Enter \; \
	bind-key -T root C-s if -F "#{pane_synchronized}" "set-window-option synchronize-panes off" "set-window-option synchronize-panes on"

bind -n F12 if -F "#{@nested_passive}" "send-keys M-F11 \; run-shell 'bash $nested_mode_script active outer' \; set -g prefix C-b \; bind -T root C-p display-popup -E '' \; bind -T root C-h display-popup -E 'htop' \; bind -T root C-z resize-pane -Z \; bind-key -T root C-q send-keys -t :. C-c '!!' Enter Enter \; bind-key -T root C-s if -F '#{pane_synchronized}' 'set-window-option synchronize-panes off' 'set-window-option synchronize-panes on'" "send-keys M-F12 \; run-shell 'bash $nested_mode_script passive-outer outer' \; set -g prefix M-F12 \; unbind -T root C-p \; unbind -T root C-h \; unbind -T root C-z \; unbind -T root C-q \; unbind -T root C-s"

# Initialize nested inner mode as soon as a client exists, and on future client changes.
run-shell "bash $nested_auto_script startup '#{client_termname}' '#{session_name}'"
set-hook -g client-attached "run-shell \"bash $nested_auto_script client-attached '#{client_termname}' '#{session_name}'\""
set-hook -g client-session-changed "run-shell \"bash $nested_auto_script client-session-changed '#{client_termname}' '#{session_name}'\""
set-hook -g session-created "run-shell \"bash $nested_auto_script session-created '#{client_termname}' '#{session_name}'\""
set-hook -g after-new-session "run-shell \"bash $nested_auto_script after-new-session '#{client_termname}' '#{session_name}'\""

set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX plugin manager
# (keep this line at the bottom)
run '~/.tmux/plugins/tpm/tpm'
